<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatitos</title>
    <style>
        html {
            scroll-behavior: smooth;
        }
        h1, h2 {
            text-align: center;
        }
        section {

            flex-wrap: wrap;
            gap: 2em;
        }
    </style>

<body>
    <h1>Gatitos everywhere</h1>

    <h2>VIDEOS</h2>
    <section id="videos">
   
        <video width="600" controls>

        </video>

        <img src="./assets/cat1.webp" alt="Cat1"> 
        <img src="./assets/cat2.webp" alt="Cat2"> 
        <img src="./assets/cat3.webp" alt="Cat3"> 
        <img src="./assets/cat4.webp" alt="Cat4" width="300" height="300">

    <h2>AUDIOS</h2>

        <audio controls>

    <footer>
        <nav>

        </nav>

</html>
